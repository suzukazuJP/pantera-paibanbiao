<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pantera 管理控制台</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0e1014;--panel:#171a21;--panel2:#1d212b;--line:#2a3039;--ink:#e6e8ec;--dim:#8a93a3;--accent:#7fd1b9;--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
body{font-family:-apple-system,"Segoe UI","Noto Sans SC",sans-serif;background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;}
button{font-family:inherit;cursor:pointer;border:none;border-radius:6px;}
input,select{font-family:inherit;background:#0b0d11;border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:7px 10px;font-size:13px;outline:none;}
input:focus,select:focus{border-color:var(--accent);}
/* login */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100;}
#login .box{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:28px;width:300px;}
#login h1{font-size:18px;color:var(--accent);margin-bottom:4px;}
#login .sub{color:var(--dim);font-size:12px;margin-bottom:18px;}
#login input{width:100%;margin-bottom:10px;}
#login button{width:100%;background:#3a6ea5;color:#fff;padding:10px;font-weight:600;}
#login .err{color:#e07a7a;font-size:12px;min-height:16px;}
/* app */
#app{display:none;flex-direction:column;height:100vh;}
#app.show{display:flex;}
header{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-shrink:0;}
header .logo{font-weight:700;color:var(--accent);font-size:15px;}
header .sp{flex:1;}
header select{min-width:140px;}
header button{background:var(--panel2);color:var(--ink);padding:7px 12px;font-size:13px;border:1px solid var(--line);}
.tabs{display:flex;gap:2px;padding:0 12px;background:var(--panel);border-bottom:1px solid var(--line);flex-shrink:0;overflow-x:auto;}
.tab{padding:10px 14px;font-size:13px;color:var(--dim);white-space:nowrap;background:none;border-bottom:2px solid transparent;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
main{flex:1;overflow:hidden;position:relative;}
.panel{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
.panel.show{display:flex;}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:10px 16px;border-bottom:1px solid var(--line);flex-shrink:0;}
.scroll{flex:1;overflow:auto;padding:8px 16px 24px;}
.muted{color:var(--dim);font-size:13px;}
/* logs */
.date-group{margin-bottom:14px;}
.date-head{font-size:12px;color:var(--dim);padding:6px 2px;position:sticky;top:0;background:var(--bg);z-index:1;}
.log-row{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:12px;cursor:pointer;}
.log-row:hover{border-color:#3a4453;}
.log-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.badge{border-radius:4px;padding:1px 7px;font-size:11px;color:#fff;white-space:nowrap;}
.t-time{color:var(--dim);font-family:var(--mono);font-size:11px;}
.t-actor{font-size:10px;border:1px solid var(--line);border-radius:4px;padding:0 5px;color:var(--dim);}
.t-target{color:var(--ink);}
.t-uid{font-family:var(--mono);font-size:10px;color:#8a94a2;}
.t-chg{color:var(--dim);font-family:var(--mono);}
.t-chg .arrow{color:var(--accent);margin:0 4px;}
.log-detail{display:none;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);color:var(--dim);font-size:12px;line-height:1.7;}
.log-row.open .log-detail{display:block;}
.log-detail code{color:#bcdcff;font-family:var(--mono);}
/* realtime */
#rt-scroll{flex:1;overflow:auto;padding:8px 16px;font-family:var(--mono);font-size:12px;background:#0b0d11;}
.rt-line{padding:3px 0;border-bottom:1px solid #14181f;display:flex;gap:8px;flex-wrap:wrap;}
.rt-time{color:#5f6b7a;}
.rt-uid{color:#7f8a99;}
#rt-jump{position:absolute;right:20px;bottom:20px;background:#3a6ea5;color:#fff;padding:8px 14px;border-radius:20px;font-size:13px;display:none;box-shadow:0 4px 14px rgba(0,0,0,.5);}
/* table */
table{width:100%;border-collapse:collapse;font-size:12px;}
th,td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--line);}
th{color:var(--dim);font-weight:600;cursor:pointer;white-space:nowrap;position:sticky;top:0;background:var(--bg);}
th:hover{color:var(--accent);}
td{color:var(--ink);}
td.mono{font-family:var(--mono);color:var(--dim);word-break:break-all;}
/* rooms */
.room-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px;}
.room-card h3{font-size:15px;margin-bottom:2px;}
.room-card .rid{color:var(--dim);font-size:12px;font-family:var(--mono);margin-bottom:10px;}
.room-links{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0;}
.room-links a{color:#9cc6ff;font-size:12px;text-decoration:none;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:5px 9px;}
.room-links button{background:var(--panel2);border:1px solid var(--line);color:var(--dim);padding:5px 9px;font-size:12px;}
.owner-box{margin-top:8px;padding:10px;background:var(--panel2);border-radius:8px;}
.owner-box .grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;}
.owner-box input{width:100%;}
.btn-s{padding:6px 11px;font-size:12px;font-weight:600;}
.b-blue{background:#3a6ea5;color:#fff;}.b-gold{background:#caa64a;color:#1a1a1a;}.b-red{background:#b0413a;color:#fff;}.b-gray{background:var(--panel2);color:var(--ink);border:1px solid var(--line);}
.add-room{background:var(--panel);border:1px dashed var(--line);border-radius:10px;padding:14px;margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.late-dd{background:var(--panel2);border:1px solid var(--line);border-radius:6px;font-size:11px;padding:0;margin:0;list-style:none;min-width:200px;display:none;}
.late-dd.open{display:block;}
.late-dd li{padding:4px 8px;color:#e08a8a;border-bottom:1px solid var(--line);white-space:nowrap;}
.late-dd li:last-child{border-bottom:none;}
.late-toggle{background:var(--panel2);color:var(--accent);border:1px solid var(--line);border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;}
.msg-compose{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:8px;}
#msg-title,#msg-body{width:100%;box-sizing:border-box;}
#msg-body{font-family:inherit;background:#0b0d11;border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:7px 10px;font-size:13px;outline:none;resize:vertical;}
.msg-chip{background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:3px 9px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;color:var(--ink);}
.msg-item{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;}
.msg-item-top{font-size:14px;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;color:var(--ink);}
.msg-to-label{font-size:11px;color:var(--dim);}
.msg-item-body{font-size:13px;color:var(--ink);white-space:pre-wrap;line-height:1.5;margin-bottom:8px;}
.msg-item-read{font-size:12px;color:var(--dim);line-height:1.6;}
.msg-kind-a{font-size:10px;font-weight:700;border-radius:4px;padding:1px 6px;color:#fff;}
.msg-kind-a.del{background:#b0413a;}.msg-kind-a.chg{background:#caa64a;color:#1a1a1a;}
/* dashboard */
.kpi-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
.kpi-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 16px;min-width:130px;flex:1;}
.kpi-card .num{font-size:22px;font-weight:700;color:var(--accent);line-height:1.3;}
.kpi-card.warn .num{color:#e08a8a;}
.kpi-card .lbl{font-size:11px;color:var(--dim);margin-top:2px;}
.dash-h{font-size:13px;color:var(--accent);margin:20px 0 10px;font-weight:600;}
.dash-h:first-child{margin-top:0;}
.room-block{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.room-block .rb-name{font-size:13px;font-weight:600;margin-bottom:8px;}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;}
.chip{border-radius:8px;padding:6px 10px;font-size:11px;color:#1a1a1a;font-weight:600;min-width:120px;}
.chip .ct{font-size:11px;}
.chip .cn{font-weight:400;font-size:10px;margin-top:2px;opacity:.75;}
.chip.empty{background:var(--panel2)!important;color:var(--dim);}
.fill-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;}
.fill-row .fl{width:56px;color:var(--dim);flex-shrink:0;}
.fill-track{flex:1;height:8px;background:var(--panel2);border-radius:4px;overflow:hidden;}
.fill-bar{height:100%;background:var(--accent);}
.fill-pct{width:48px;text-align:right;color:var(--dim);font-family:var(--mono);font-size:11px;flex-shrink:0;}
.chart-wrap{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px;}
.chart-wrap canvas{width:100%;height:140px;display:block;}
.rank-row{display:flex;align-items:center;gap:8px;padding:6px 2px;border-bottom:1px solid var(--line);font-size:12px;}
.rank-row .rk{width:18px;color:var(--dim);}
.rank-row .rn{flex:1;}
.rank-row .rc{color:#e08a8a;font-family:var(--mono);}
/* live stats (直播数据) */
.ld-form{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px;}
.ld-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-top:10px;}
.ld-field label{display:block;font-size:11px;color:var(--dim);margin-bottom:3px;}
.ld-field input{width:100%;}
.ld-field.ocr-hit input{border-color:var(--accent);}
.ld-status{font-size:12px;color:var(--dim);margin:6px 0;}
.ld-status.busy{color:var(--accent);}
.ld-status.err{color:#e08a8a;}
.ld-drop{border:1px dashed var(--line);border-radius:8px;padding:16px;text-align:center;color:var(--dim);font-size:12px;cursor:pointer;}
.ld-drop:hover{border-color:var(--accent);color:var(--accent);}
.ld-sess{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px;}
.ld-sess-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;cursor:pointer;}
.ld-sess-top b{color:var(--accent);}
.ld-sess-detail{display:none;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;font-size:11px;color:var(--dim);}
.ld-sess.open .ld-sess-detail{display:grid;}
.ld-sess-detail span b{color:var(--ink);}
/* video generation */
.video-progress{height:6px;background:var(--panel2);border-radius:3px;overflow:hidden;margin:8px 0;display:none;}
.video-progress.show{display:block;}
.video-progress-bar{height:100%;width:0%;background:var(--accent);transition:width .15s linear;}
#video-preview{width:240px;max-width:100%;background:#000;}
</style>
</head>
<body>
<div id="login"><div class="box">
  <h1>Pantera 控制台</h1><div class="sub">管理员登录</div>
  <input id="m-id" placeholder="管理员ID" autocomplete="off">
  <input id="m-pw" type="password" placeholder="密码">
  <div class="err" id="m-err"></div>
  <button onclick="adminLogin()">登录</button>
</div></div>

<div id="app">
  <header>
    <span class="logo">⚙ Pantera 控制台</span>
    <span class="muted" id="scope-label"></span>
    <span class="sp"></span>
    <select id="room-select" onchange="onScopeChange()"></select>
    <button onclick="adminLogout()">退出</button>
  </header>
  <div class="tabs">
    <button class="tab active" data-tab="dash" onclick="switchTab('dash')">仪表盘</button>
    <button class="tab" data-tab="logs" onclick="switchTab('logs')">操作日志</button>
    <button class="tab" data-tab="rt" onclick="switchTab('rt')">实时日志</button>
    <button class="tab" data-tab="overview" onclick="switchTab('overview')">班表总览</button>
    <button class="tab" data-tab="users" onclick="switchTab('users')">员工</button>
    <button class="tab" data-tab="late" onclick="switchTab('late')">迟到统计</button>
    <button class="tab" data-tab="livedata" onclick="switchTab('livedata')">直播数据</button>
    <button class="tab" data-tab="rooms" onclick="switchTab('rooms')">直播间管理</button>
    <button class="tab" data-tab="messages" onclick="switchTab('messages')">消息</button>
  </div>
  <main>
    <!-- dashboard -->
    <div class="panel show" id="panel-dash">
      <div class="toolbar">
        <button class="btn-s b-gray" onclick="dashNav(-1)">‹ 上月</button>
        <b id="dash-label" style="min-width:90px;text-align:center;"></b>
        <button class="btn-s b-gray" onclick="dashNav(1)">下月 ›</button>
        <button class="btn-s b-gray" onclick="loadDashboard()">刷新</button>
      </div>
      <div class="scroll" id="dash-scroll"><p class="muted">加载中…</p></div>
    </div>
    <!-- logs -->
    <div class="panel" id="panel-logs">
      <div class="toolbar">
        <input id="log-search" placeholder="关键词搜索…" oninput="renderLogs()" style="flex:1;min-width:140px;">
        <select id="log-action" onchange="renderLogs()"><option value="">全部操作</option></select>
        <select id="log-actor" onchange="renderLogs()"><option value="">全部身份</option><option value="master">管理员</option><option value="staff">员工</option><option value="owner">商家</option></select>
        <button class="btn-s b-gray" onclick="loadLogs()">刷新</button>
        <button class="btn-s b-red" onclick="clearLogs()">清空日志</button>
      </div>
      <div class="scroll" id="logs-scroll"><p class="muted">加载中…</p></div>
    </div>
    <!-- realtime -->
    <div class="panel" id="panel-rt">
      <div class="toolbar"><span class="muted">实时日志（新事件自动追加到底部）</span><span class="sp" style="flex:1"></span><button class="btn-s b-red" onclick="clearLogs()">清空日志</button><button class="btn-s b-gray" onclick="restartRealtime()">重连</button></div>
      <div id="rt-scroll"></div>
      <button id="rt-jump" onclick="rtFollowNow()">⬇ 回到最新</button>
    </div>
    <!-- overview -->
    <div class="panel" id="panel-overview">
      <div class="toolbar">
        <button class="btn-s b-gray" onclick="ovNav(-1)">‹ 上月</button>
        <b id="ov-label" style="min-width:90px;text-align:center;"></b>
        <button class="btn-s b-gray" onclick="ovNav(1)">下月 ›</button>
        <input id="ov-search" placeholder="姓名搜索…" oninput="renderOverview()" style="flex:1;min-width:120px;">
        <button class="btn-s b-gray" onclick="loadOverview()">刷新</button>
      </div>
      <div class="scroll" id="ov-scroll"></div>
    </div>
    <!-- users -->
    <div class="panel" id="panel-users">
      <div class="toolbar"><input id="user-search" placeholder="昵称/生日搜索…" oninput="renderUsers()" style="flex:1;min-width:140px;"><button class="btn-s b-gray" onclick="loadUsers()">刷新</button></div>
      <div class="scroll" id="users-scroll"></div>
    </div>
    <!-- late stats -->
    <div class="panel" id="panel-late">
      <div class="toolbar">
        <button class="btn-s b-gray" onclick="lateNav(-1)">‹ 上月</button>
        <b id="late-label" style="min-width:90px;text-align:center;"></b>
        <button class="btn-s b-gray" onclick="lateNav(1)">下月 ›</button>
        <input id="late-search" placeholder="姓名搜索…" oninput="renderLate()" style="flex:1;min-width:120px;">
        <button class="btn-s b-gray" onclick="loadLate()">刷新</button>
      </div>
      <div class="scroll" id="late-scroll"></div>
    </div>
    <!-- live data -->
    <div class="panel" id="panel-livedata">
      <div class="toolbar">
        <select id="ld-room" onchange="loadLdSessions()"></select>
        <input type="date" id="ld-date" onchange="loadLdSessions()">
        <input type="time" id="ld-time">
        <button class="btn-s b-gray" onclick="loadLdSessions()">刷新列表</button>
      </div>
      <div class="scroll" id="livedata-scroll">
        <div class="ld-form">
          <div class="ld-drop" id="ld-drop" onclick="$('ld-file').click()">📷 点击选择「直播数据大屏」截图上传，或直接 Cmd+V / Ctrl+V 粘贴截图，自动识别其中的数据（识别后可核对/修改再保存）</div>
          <input type="file" id="ld-file" accept="image/*" style="display:none;" onchange="ldHandleFile(this.files[0])">
          <div class="ld-status" id="ld-status"></div>
          <div id="ld-raw-wrap" style="display:none;margin-bottom:8px;">
            <button class="btn-s b-gray" onclick="var t=$('ld-raw-text');t.style.display=t.style.display==='none'?'block':'none';">查看/隐藏 识别原始文字（调试用）</button>
            <textarea id="ld-raw-text" readonly style="display:none;width:100%;height:160px;margin-top:6px;font-family:var(--mono);font-size:11px;background:#0b0d11;border:1px solid var(--line);color:var(--dim);border-radius:6px;padding:8px;"></textarea>
          </div>
          <div class="ld-grid" id="ld-grid"></div>
          <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
            <button class="btn-s b-blue" onclick="saveLdSession()">💾 保存本场数据</button>
            <button class="btn-s b-gray" onclick="resetLdForm()">清空重来</button>
            <span class="muted" id="ld-edit-tag"></span>
          </div>
        </div>
        <h4 style="color:var(--accent);font-size:13px;margin:14px 0 8px;">已保存的场次</h4>
        <div id="ld-sess-list"></div>
      </div>
    </div>
    <!-- rooms -->
    <div class="panel" id="panel-rooms"><div class="scroll" id="rooms-scroll"></div></div>
    <div class="panel" id="panel-messages"><div class="scroll" id="msg-scroll">
      <div class="msg-compose">
        <h4 style="color:var(--accent);font-size:14px;margin-bottom:10px;">发送消息（<span id="msg-scope-label"></span>）</h4>
        <div style="display:flex;gap:16px;margin-bottom:10px;font-size:13px;">
          <label><input type="radio" name="msgto" value="all" checked onchange="renderMsgTargets()"> 全部员工</label>
          <label><input type="radio" name="msgto" value="users" onchange="renderMsgTargets()"> 指定员工</label>
        </div>
        <div id="msg-targets" style="display:none;flex-wrap:wrap;gap:6px;margin-bottom:10px;"></div>
        <input id="msg-title" placeholder="标题（例：本周注意事项）" style="margin-bottom:8px;">
        <textarea id="msg-body" placeholder="消息内容…" style="min-height:80px;margin-bottom:10px;"></textarea>
        <button class="btn-s b-blue" onclick="sendAdminMessage()">发送</button>
      </div>
      <h4 style="color:var(--accent);font-size:14px;margin:18px 0 10px;">已发送的消息</h4>
      <div id="msg-list"></div>
    </div></div>
  </main>
</div>

<script>
const firebaseConfig={databaseURL:"https://pantera-paibanbiao-default-rtdb.asia-southeast1.firebasedatabase.app"};
const MASTER_ID="pantera",MASTER_PW="1205";
const BASE=firebaseConfig.databaseURL;
const ROLES=[{key:'A',label:'主播1'},{key:'B',label:'主播2'},{key:'C',label:'中控1'},{key:'E',label:'拍视频1'},{key:'F',label:'拍视频2'}];
firebase.initializeApp(firebaseConfig);
const fdb=firebase.database();
const DB={get:p=>fdb.ref(p).once('value').then(s=>s.val()),set:(p,v)=>fdb.ref(p).set(v),remove:p=>fdb.ref(p).remove(),raw:fdb};
const $=id=>document.getElementById(id);
function entriesOf(x){return x?Object.entries(x).filter(([,v])=>v!=null):[];}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function pad2(n){return String(n).padStart(2,'0');}
function nowStr(){const d=new Date();return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;}

/* ===== 操作日志记录（admin 内的写操作） ===== */
async function logEvent(roomId,ev){try{const ts=Date.now();const key=(9999999999999-ts)+'_'+Math.random().toString(36).slice(2,7);

function timeToMinutes(t){if(!t||typeof t!=='string')return 99999;const m=t.match(/(\d{1,2}):(\d{2})/);if(!m)return 99999;return parseInt(m[1],10)*60+parseInt(m[2],10);}
function shiftStartTs(y,mo,d,time){return new Date(y,mo-1,d).getTime()+timeToMinutes(time)*60000;}
let lateYear=2026,lateMonth=6,lateRows=[];
function lateNav(d){let y=lateYear,m=lateMonth+d;if(m<1){m=12;y--;}if(m>12){m=1;y++;}if(y<2026)return;lateYear=y;lateMonth=m;loadLate();}
async function loadLate(){
  $('late-label').textContent=`${lateYear}年${lateMonth}月`;$('late-scroll').innerHTML='<p class="muted">加载中…</p>';
  const rows=[];
  for(const rid of scopeRoomIds()){
    const md=await DB.get(`rooms/${rid}/shifts/${lateYear}/${lateMonth}`);if(!md)continue;
    let sl=await DB.get(`rooms/${rid}/slots`);sl=sl||{};
    entriesOf(md).forEach(([dayStr,dd])=>{const day=parseInt(dayStr,10);if(!day||!dd)return;
      Object.entries(dd).forEach(([slotId,slot])=>{if(slotId==='memo'||!slot)return;const s=sl[slotId]||{order:0,time:slotId};
        ROLES.forEach(r=>{const h=slot[r.key];if(h&&h.id){const hasChk=!!(h.checkIn&&h.checkInBy);const startTs=shiftStartTs(lateYear,lateMonth,day,s.time);const min=hasChk?Math.max(0,Math.round((h.checkIn-startTs)/60000)):0;const late=hasChk?h.checkIn>startTs:false;
          rows.push({rid,room:(rooms[rid]||{}).name||rid,day,order:s.order||0,start:(String(s.time||'').match(/(\d{1,2}):(\d{2})/)||[])[0]||(s.time||''),slot:`${s.order||''}班 ${s.time||''}`,slotId,role:r.label,roleKey:r.key,name:h.name,uid:h.id,checkIn:hasChk?h.checkIn:null,checkInBy:hasChk?h.checkInBy:null,late,min});}});});});
  }
  lateRows=rows;renderLate();
}
function lateHHMM(ts){const d=new Date(ts);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function lateDT(ts){const d=new Date(ts);return (d.getMonth()+1)+'/'+d.getDate()+' '+pad2(d.getHours())+':'+pad2(d.getMinutes());}
async function setAttendTime(rid,day,slotId,roleKey){const inp=document.getElementById(`att-${rid}-${day}-${slotId}-${roleKey}`);const v=(inp&&inp.value||'').trim();const m=v.match(/^(\d{1,2}):(\d{2})$/);if(!m){alert('请输入正确的时间（HH:MM，例 20:15）');return;}const ts=new Date(lateYear,lateMonth-1,day,parseInt(m[1],10),parseInt(m[2],10)).getTime();const base=`rooms/${rid}/shifts/${lateYear}/${lateMonth}/${day}/${slotId}/${roleKey}`;await DB.set(`${base}/checkIn`,ts);await DB.set(`${base}/checkInBy`,'manual');loadLate();}

/* 90天以上前の日志を自動削除（控制台を開いた時に実行） */
async function purgeOldLogs(){
  const cutoff=Date.now()-90*24*60*60*1000;
  try{const all=await DB.get('rooms');if(!all)return;
    for(const rid of Object.keys(all)){const logs=all[rid]&&all[rid].logs;if(!logs)continue;
      for(const k of Object.keys(logs)){const v=logs[k];if(v&&v.ts&&v.ts<cutoff)await DB.remove(`rooms/${rid}/logs/${k}`);}}
  }catch(e){}
}

/* ===== 仪表盘 ===== */
function dashNav(d){let y=dashYear,m=dashMonth+d;if(m<1){m=12;y--;}if(m>12){m=1;y++;}if(y<2026)return;dashYear=y;dashMonth=m;loadDashboard();}
function computeSlotStatus(slot){
  if(!slot)return 'red';
  if(slot._status&&STATUS_HEX[slot._status])return slot._status;
  const has=k=>(slot[k]&&slot[k].id)?1:0;
  const G=has('A')+has('B'),H=has('C'),I=has('E')+has('F');
  const groups=(G>0?1:0)+(H>0?1:0)+(I>0?1:0);
  if(groups===0){const hasLock=ROLES.some(r=>slot[r.key]&&slot[r.key].locked);return hasLock?'gray':'red';}
  if(groups===1)return'yellow';
  if(G===1&&H===1)return'green';
  return'blue';
}
function slotNames(slot){if(!slot)return[];return ROLES.map(r=>slot[r.key]).filter(h=>h&&h.id).map(h=>h.name);}
function monthLateCounts(y,m,sl,md){
  let total=0,late=0;
  if(!md)return{total,late};
  entriesOf(md).forEach(([dayStr,dd])=>{const day=parseInt(dayStr,10);if(!day||!dd)return;
    Object.entries(dd).forEach(([slotId,slot])=>{if(slotId==='memo'||!slot)return;const s=sl[slotId]||{order:0,time:slotId};
      ROLES.forEach(r=>{const h=slot[r.key];if(h&&h.id&&h.checkIn&&h.checkInBy){total++;const startTs=shiftStartTs(y,m,day,s.time);if(h.checkIn>startTs)late++;}});});});
  return{total,late};
}
let dashLoadSeq=0;
async function loadDashboard(){
  const mySeq=++dashLoadSeq;
  $('dash-label').textContent=`${dashYear}年${dashMonth}月`;$('dash-scroll').innerHTML='<p class="muted">加载中…</p>';
  const roomIds=scopeRoomIds();
  const today=new Date();
  const isCurMonth=today.getFullYear()===dashYear&&(today.getMonth()+1)===dashMonth;
  const u=await DB.get('users');usersCache=entriesOf(u).map(([,x])=>x);
  const newUsers=usersCache.filter(x=>{if(!x.createdAt)return false;const d=new Date(x.createdAt);return d.getFullYear()===dashYear&&(d.getMonth()+1)===dashMonth;}).length;

  const roomStats=[];
  const slotsByRoom={};
  let totFilled=0,totSlots=0,totStatus={green:0,yellow:0,red:0,blue:0,gray:0};
  for(const rid of roomIds){
    let sl=await DB.get(`rooms/${rid}/slots`);sl=sl||{};slotsByRoom[rid]=sl;
    const slIds=Object.keys(sl);
    const md=await DB.get(`rooms/${rid}/shifts/${dashYear}/${dashMonth}`);
    const daysInMonth=new Date(dashYear,dashMonth,0).getDate();
    let filled=0,total=0;const statusCounts={green:0,yellow:0,red:0,blue:0,gray:0};
    const byRole={};ROLES.forEach(r=>byRole[r.key]={total:0,filled:0});
    const todaySlots=[];
    for(let day=1;day<=daysInMonth;day++){
      const dd=md&&md[day];
      slIds.forEach(slotId=>{
        const s=sl[slotId]||{};const slot=dd&&dd[slotId];
        ROLES.forEach(r=>{byRole[r.key].total++;const h=slot&&slot[r.key];if(h&&h.id){filled++;byRole[r.key].filled++;}});
        total+=ROLES.length;
        const status=computeSlotStatus(slot);statusCounts[status]++;
        if(isCurMonth&&day===today.getDate())todaySlots.push({slotId,order:s.order||0,time:s.time||'',status,names:slotNames(slot)});
      });
    }
    todaySlots.sort((a,b)=>a.order-b.order);
    roomStats.push({id:rid,name:(rooms[rid]||{}).name||rid,filled,total,statusCounts,byRole,todaySlots});
    totFilled+=filled;totSlots+=total;Object.keys(totStatus).forEach(k=>totStatus[k]+=statusCounts[k]);
  }

  /* 迟到趋势：往前推6个月（含当月） */
  const trendMonths=[];for(let i=5;i>=0;i--){let y=dashYear,m=dashMonth-i;while(m<1){m+=12;y--;}trendMonths.push({y,m});}
  const trend=[];
  for(const{y,m}of trendMonths){
    let total=0,late=0;
    for(const rid of roomIds){const md=await DB.get(`rooms/${rid}/shifts/${y}/${m}`);const c=monthLateCounts(y,m,slotsByRoom[rid],md);total+=c.total;late+=c.late;}
    trend.push({y,m,total,late});
  }
  /* 本月迟到排行 */
  const lateSum={};
  for(const rid of roomIds){
    const md=await DB.get(`rooms/${rid}/shifts/${dashYear}/${dashMonth}`);if(!md)continue;
    const sl=slotsByRoom[rid];
    entriesOf(md).forEach(([dayStr,dd])=>{const day=parseInt(dayStr,10);if(!day||!dd)return;
      Object.entries(dd).forEach(([slotId,slot])=>{if(slotId==='memo'||!slot)return;const s=sl[slotId]||{order:0,time:slotId};
        ROLES.forEach(r=>{const h=slot[r.key];if(h&&h.id&&h.checkIn&&h.checkInBy){const startTs=shiftStartTs(dashYear,dashMonth,day,s.time);
          if(h.checkIn>startTs){const k=h.name;lateSum[k]=(lateSum[k]||0)+1;}}});});});
  }
  const lateRank=Object.entries(lateSum).map(([name,c])=>({name,c})).sort((a,b)=>b.c-a.c).slice(0,5);

  /* 直播数据（本月GMV等，来自截图OCR录入） */
  const daysInMonth2=new Date(dashYear,dashMonth,0).getDate();
  const gmvByDay=Array.from({length:daysInMonth2},()=>0);
  let liveTotals={gmv:0,orders:0,newFollowers:0,sessions:0};
  let liveToday={gmv:0,orders:0,newFollowers:0,sessions:0};
  for(const rid of roomIds){
    const md=await DB.get(`rooms/${rid}/liveStats/${dashYear}/${dashMonth}`);if(!md)continue;
    entriesOf(md).forEach(([dayStr,dd])=>{const day=parseInt(dayStr,10);if(!day||!dd)return;
      entriesOf(dd).forEach(([,rec])=>{if(!rec)return;
        const g=rec.gmv||0;gmvByDay[day-1]+=g;
        liveTotals.gmv+=g;liveTotals.orders+=rec.orders||0;liveTotals.newFollowers+=rec.newFollowers||0;liveTotals.sessions++;
        if(isCurMonth&&day===today.getDate()){liveToday.gmv+=g;liveToday.orders+=rec.orders||0;liveToday.newFollowers+=rec.newFollowers||0;liveToday.sessions++;}
      });});
  }

  if(mySeq!==dashLoadSeq)return;
  renderDashboard({roomStats,totFilled,totSlots,totStatus,newUsers,trend,lateRank,roomCount:roomIds.length,userCount:usersCache.length,isCurMonth,gmvByDay,liveTotals,liveToday});
}

function drawBarChart(canvas,labels,values,opts){
  opts=opts||{};
  const dpr=window.devicePixelRatio||1;
  const W=canvas.clientWidth||300,H=canvas.clientHeight||140;
  canvas.width=W*dpr;canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  const pad={l:20,r:8,t:16,b:20};
  const max=Math.max(1,...values);
  const bw=(W-pad.l-pad.r)/Math.max(1,values.length);
  ctx.strokeStyle='#2a3039';ctx.beginPath();ctx.moveTo(pad.l,H-pad.b);ctx.lineTo(W-pad.r,H-pad.b);ctx.stroke();
  ctx.textAlign='center';
  values.forEach((v,i)=>{
    const bh=(H-pad.t-pad.b)*(v/max);
    const x=pad.l+i*bw+bw*0.22,w=bw*0.56;
    const y=H-pad.b-bh;
    ctx.fillStyle=opts.color||'#7fd1b9';
    ctx.fillRect(x,y,w,Math.max(0,bh));
    ctx.fillStyle='#e6e8ec';ctx.font='10px sans-serif';ctx.fillText(String(v),x+w/2,y-4>pad.t?y-4:pad.t+10);
    ctx.fillStyle='#8a93a3';ctx.fillText(labels[i],x+w/2,H-pad.b+13);
  });
}

/* ===== 动画生成（Canvas逐帧描画 + ffmpeg.wasm本地编码，无需服务器） ===== */
const VIDEO_W=1080,VIDEO_H=1920,VIDEO_FPS=30,VIDEO_DUR=15;
const VIDEO_COLORS={bg:'#0e1014',ink:'#e6e8ec',dim:'#8a93a3',accent:'#7fd1b9',gold:'#caa64a'};
function easeOutCubic(x){return 1-Math.pow(1-x,3);}
function clamp(x,a,b){return Math.max(a,Math.min(b,x));}
function fadeAlpha(local,dur,fi,fo){fi=fi==null?0.4:fi;fo=fo==null?0.4:fo;if(local<fi)return clamp(local/fi,0,1);if(local>dur-fo)return clamp((dur-local)/fo,0,1);return 1;}
const VIDEO_SCENES=[
  {name:'intro',start:0,end:2.5},
  {name:'kpi',start:2.5,end:6},
  {name:'gmv',start:6,end:10},
  {name:'status',start:10,end:13},
  {name:'outro',start:13,end:VIDEO_DUR},
];
function renderVideoFrame(ctx,t,data){
  ctx.fillStyle=VIDEO_COLORS.bg;ctx.fillRect(0,0,VIDEO_W,VIDEO_H);
  const sc=VIDEO_SCENES.find(s=>t>=s.start&&t<s.end)||VIDEO_SCENES[VIDEO_SCENES.length-1];
  const local=t-sc.start,dur=sc.end-sc.start;
  if(sc.name==='intro')videoSceneIntro(ctx,local,dur,data);
  else if(sc.name==='kpi')videoSceneKpi(ctx,local,dur,data);
  else if(sc.name==='gmv')videoSceneGmv(ctx,local,dur,data);
  else if(sc.name==='status')videoSceneStatus(ctx,local,dur,data);
  else videoSceneOutro(ctx,local,dur,data);

function videoSceneIntro(ctx,local,dur,data){
  const a=fadeAlpha(local,dur,0.5,0.5);
  ctx.save();ctx.globalAlpha=a;ctx.textAlign='center';
  ctx.fillStyle=VIDEO_COLORS.accent;ctx.font='700 90px sans-serif';ctx.fillText('PANTERA',VIDEO_W/2,VIDEO_H/2-40);
  ctx.fillStyle=VIDEO_COLORS.ink;ctx.font='36px sans-serif';
  const roomLabel=data.roomStats.length===1?data.roomStats[0].name:'全部直播间';
  ctx.fillText(roomLabel,VIDEO_W/2,VIDEO_H/2+40);

  ctx.restore();
}
function videoSceneKpi(ctx,local,dur,data){
  const a=fadeAlpha(local,dur,0.4,0.4);
  const p=easeOutCubic(clamp(local/1.2,0,1));
  ctx.save();ctx.globalAlpha=a;ctx.textAlign='center';
  ctx.fillStyle=VIDEO_COLORS.dim;ctx.font='32px sans-serif';ctx.fillText('本月概览',VIDEO_W/2,320);
  const pct=data.totSlots?Math.round(data.totFilled/data.totSlots*100):0;
  const gmv=Math.round((data.liveTotals.gmv||0)*p);
  const orders=Math.round((data.liveTotals.orders||0)*p);
  const fillPct=Math.round(pct*p);
  const rows=[[gmv.toLocaleString(),'本月GMV合计（円）'],[String(orders),'本月成交件数'],[fillPct+'%','排班充足率']];
  let y=560;
  rows.forEach(([num,lbl])=>{
    ctx.fillStyle=VIDEO_COLORS.gold;ctx.font='700 96px sans-serif';ctx.fillText(num,VIDEO_W/2,y);
    ctx.fillStyle=VIDEO_COLORS.dim;ctx.font='28px sans-serif';ctx.fillText(lbl,VIDEO_W/2,y+50);
    y+=280;
  });
  ctx.restore();
}
function videoSceneGmv(ctx,local,dur,data){
  const a=fadeAlpha(local,dur,0.4,0.4);
  const reveal=clamp(local/(dur-0.6),0,1);
  ctx.save();ctx.globalAlpha=a;ctx.textAlign='center';
  ctx.fillStyle=VIDEO_COLORS.dim;ctx.font='32px sans-serif';ctx.fillText('GMV 日推移',VIDEO_W/2,320);
  const days=data.gmvByDay||[];
  const visibleCount=Math.max(1,Math.round(days.length*reveal));
  const pad={l:80,r:80,t:420,b:1500};
  const max=Math.max(1,...days);
  const bw=(VIDEO_W-pad.l-pad.r)/Math.max(1,days.length);
  for(let i=0;i<visibleCount;i++){
    const v=days[i]||0;
    const bh=(pad.b-pad.t)*(v/max);
    const x=pad.l+i*bw+bw*0.15,w=bw*0.7;
    const y=pad.b-bh;
    ctx.fillStyle=VIDEO_COLORS.gold;ctx.fillRect(x,y,w,Math.max(2,bh));
  }
  ctx.strokeStyle='#2a3039';ctx.beginPath();ctx.moveTo(pad.l,pad.b);ctx.lineTo(VIDEO_W-pad.r,pad.b);ctx.stroke();
  ctx.restore();
}
function videoSceneStatus(ctx,local,dur,data){
  const a=fadeAlpha(local,dur,0.4,0.4);
  const p=easeOutCubic(clamp(local/1.0,0,1));
  ctx.save();ctx.globalAlpha=a;ctx.textAlign='center';
  ctx.fillStyle=VIDEO_COLORS.dim;ctx.font='32px sans-serif';ctx.fillText('本月排班状态分布',VIDEO_W/2,420);
  const order=[['green','已齐'],['blue','需协调'],['yellow','缺一方'],['red','无人'],['gray','已锁定']];
  const total=Object.values(data.totStatus||{}).reduce((a,b)=>a+b,0)||1;
  let y=560;
  order.forEach(([key,label])=>{
    const v=(data.totStatus||{})[key]||0;
    const w=(VIDEO_W-160)*(v/total)*p;
    ctx.fillStyle=STATUS_HEX[key];ctx.fillRect(80,y,Math.max(0,w),56);
    ctx.textAlign='left';ctx.fillStyle=VIDEO_COLORS.ink;ctx.font='26px sans-serif';ctx.fillText(`${label} ${v}`,80,y-14);
    ctx.textAlign='center';
    y+=140;
  });
  ctx.restore();
}
function videoSceneOutro(ctx,local,dur,data){
  const a=fadeAlpha(local,dur,0.4,0.6);
  ctx.save();ctx.globalAlpha=a;ctx.textAlign='center';
  ctx.fillStyle=VIDEO_COLORS.accent;ctx.font='700 70px sans-serif';ctx.fillText('PANTERA',VIDEO_W/2,VIDEO_H/2-20);
  ctx.fillStyle=VIDEO_COLORS.dim;ctx.font='30px sans-serif';ctx.fillText('本月辛苦了 🎬',VIDEO_W/2,VIDEO_H/2+50);
  ctx.restore();
}
let _ffmpegInstance=null;

async function generateDashboardVideo(){

/* ===== 直播数据（截图OCR识别） ===== */
const LIVE_FIELDS=[
  {key:'gmv',label:'归因GMV',unit:'円'},
  {key:'orders',label:'归因成交件数',unit:'件'},
  {key:'viewersNow',label:'浏览人数',unit:'人'},
  {key:'exposure',label:'曝光次数',unit:''},
  {key:'views',label:'观看次数',unit:''},
  {key:'ctrPreview',label:'点击率（通过直播预览）',unit:'%'},
  {key:'ctr',label:'点击率',unit:'%'},
  {key:'productClicks',label:'商品点击量',unit:''},
  {key:'liveCtr',label:'直播点击率',unit:'%'},
  {key:'skuCvr',label:'点击成交转化率（SKU订单）',unit:'%'},
  {key:'skuOrderRate',label:'下单率（SKU订单）',unit:'%'},
  {key:'payRate',label:'付款率',unit:'%'},
  {key:'productExposure',label:'商品曝光次数',unit:''},
  {key:'gmvPer1kExposure',label:'千次曝光成交金额',unit:'円'},
  {key:'gmvPer1kViews',label:'千次观看成交金额',unit:'円'},
  {key:'avgWatchSec',label:'人均观看时长',unit:'秒'},
  {key:'likes',label:'点赞数',unit:''},
  {key:'newFollowers',label:'新增粉丝数',unit:''},
];
function normLabel(s){return String(s||'').replace(/[\s:：()（）\[\]]/g,'');}
function parseNumUnit(s){
  if(!s)return null;
  const m=String(s).match(/([\d]{1,3}(?:,\d{3})+(?:\.\d+)?|\d+(?:\.\d+)?)(?:(?!K|k|万|%)[a-zA-Z])?\s*(K|k|万|%)?/);
  if(!m)return null;
  let num=parseFloat(m[1].replace(/,/g,''));
  if(isNaN(num))return null;
  const unit=m[2];
  if(unit==='K'||unit==='k')num*=1000;
  else if(unit==='万')num*=10000;
  return num;
}
/* 大屏OCR的实际输出规律：一行里会把同一行的多个"标签"连在一起，紧跟着下一行把对应的多个"数值"用空格连在一起
   （而不是"标签→数值"逐项交替）。所以按"行对"来解析：先在一行里贪婪匹配出这行包含哪几个已知标签（按长度从长到短，
   避免"点击率"抢到"点击率（通过直播预览）"的位置），再把下一行按空白切开，按顺序一一对应赋值。 */
function tokenizeLabels(line,candidates){
  const norm=normLabel(line);
  let pos=0;const found=[];
  while(pos<norm.length){
    let matched=null;
    for(const f of candidates){
      const nl=normLabel(f.label);
      if(nl&&norm.startsWith(nl,pos)){matched=f;break;}
    }
    if(matched){found.push(matched);pos+=normLabel(matched.label).length;}
    else pos++;
  }
  return found;
}
function parseLiveStatsText(rawText){
  const raw=String(rawText||'');
  const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  const result={};
  const gmvIdx=lines.findIndex(l=>/GMV/i.test(l));
  if(gmvIdx>=0){
    let v=parseNumUnit(lines[gmvIdx]);
    if(v==null)v=parseNumUnit(lines[gmvIdx+1]);
    if(v==null)v=parseNumUnit(lines[gmvIdx+2]);
    if(v!=null)result.gmv=v;
  }
  /* 顶部两个胶囊（归因成交件数/浏览人数）经常和图标文字挤在同一行，用关键词就近查找数字，不按行对解析 */
  /* OCR有时会在每个汉字之间插入空格（如"归 因 成 交 件 数"），先去空格再匹配这两个胶囊标签，避免匹配不到 */
  const rawNoSpace=raw.replace(/\s+/g,'');
  {const m=rawNoSpace.match(/成交件数[^\d]{0,1}(\d+(?:\.\d+)?)/);if(m)result.orders=parseFloat(m[1]);}
  {const m=rawNoSpace.match(/浏览人数[^\d]{0,1}(\d+(?:\.\d+)?)(K|k|万)?/);if(m){let v=parseFloat(m[1]);if(m[2]==='K'||m[2]==='k')v*=1000;else if(m[2]==='万')v*=10000;result.viewersNow=v;}}

  const candidates=[...LIVE_FIELDS].filter(f=>f.key!=='gmv'&&f.key!=='orders'&&f.key!=='viewersNow').sort((a,b)=>b.label.length-a.label.length);
  const usedLine=new Set();
  for(let i=0;i<lines.length-1;i++){
    if(usedLine.has(i)||i===gmvIdx)continue;
    const labelsFound=tokenizeLabels(lines[i],candidates).filter(f=>result[f.key]==null);
    if(!labelsFound.length)continue;
    const tokens=lines[i+1].split(/\s+/).filter(Boolean);
    let ok=0;
    for(let k=0;k<labelsFound.length&&k<tokens.length;k++){
      const v=parseNumUnit(tokens[k]);
      if(v!=null){result[labelsFound[k].key]=v;ok++;}
    }
    if(ok){usedLine.add(i);usedLine.add(i+1);}
  }
  /* 百分比数值的小数点经常被识别丢失（如"4.18%"被读成"418%"），导致数值变成100倍。
     这类费率型指标现实中不会达到100%，所以超过100就当作丢了小数点，自动÷100修正 */
  LIVE_FIELDS.forEach(f=>{if(f.unit==='%'&&result[f.key]!=null&&result[f.key]>=100)result[f.key]=result[f.key]/100;});
  return result;
}

function enhanceForOcr(ctx,w,h){
  const imgData=ctx.getImageData(0,0,w,h);const d=imgData.data;
  const gray=new Float32Array(w*h);
  let min=255,max=0;
  for(let i=0,p=0;i<d.length;i+=4,p++){
    const g=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
    gray[p]=g;if(g<min)min=g;if(g>max)max=g;
  }
  const range=Math.max(1,max-min);
  for(let i=0,p=0;i<d.length;i+=4,p++){
    const v=Math.max(0,Math.min(255,Math.round((gray[p]-min)/range*255)));
    d[i]=d[i+1]=d[i+2]=v;
  }
  ctx.putImageData(imgData,0,0);
}
function downscaleImageFile(file,maxDim){
  return new Promise((resolve,reject)=>{
    const img=new Image();const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.naturalWidth,h=img.naturalHeight;
      if(Math.max(w,h)>maxDim){const s=maxDim/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
      const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,w,h);
      enhanceForOcr(ctx,w,h);
      canvas.toBlob(b=>b?resolve(b):reject(new Error('压缩图片失败')),'image/png');
    };
    img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('图片加载失败'));};
    img.src=url;
  });
}
async function ldHandleFile(file){
  if(!file)return;
  const st=$('ld-status');st.className='ld-status busy';st.textContent='正在压缩图片…';
  try{
    const small=await downscaleImageFile(file,1600);
    st.textContent='识别中…（首次使用需下载识别引擎，可能需要几十秒）';
    const {data}=await Tesseract.recognize(small,'chi_sim+eng');
    $('ld-raw-wrap').style.display='block';$('ld-raw-text').value=data.text||'';
    const parsed=parseLiveStatsText(data.text);
    const hits={};Object.keys(parsed).forEach(k=>hits[k]=true);
    renderLdGrid(parsed,hits);
    const n=Object.keys(parsed).length;
    st.className='ld-status';st.textContent=n?`已自动识别 ${n}/${LIVE_FIELDS.length} 项，请核对后保存（未识别到的项请手动填写）。`:'未能自动识别出数据，请手动填写。';
  }catch(e){
    st.className='ld-status err';st.textContent='识别失败：'+(e&&e.message||e);
  }
}
function collectLdForm(){
  const v={};
  LIVE_FIELDS.forEach(f=>{const el=$('ldf-'+f.key);const n=el&&el.value!==''?parseFloat(el.value):null;if(n!=null&&!isNaN(n))v[f.key]=n;});
  return v;
}
async function saveLdSession(){
  const rid=$('ld-room').value;if(!rid){alert('请先在「直播间管理」添加直播间');return;}
  const dateStr=$('ld-date').value,timeStr=$('ld-time').value||'00:00';
  if(!dateStr){alert('请选择日期');return;}
  const [y,m,d]=dateStr.split('-').map(x=>parseInt(x,10));
  const [hh,mm]=timeStr.split(':').map(x=>parseInt(x,10));
  const ts=new Date(y,m-1,d,hh||0,mm||0).getTime();
  const values=collectLdForm();
  if(!Object.keys(values).length){alert('请至少填写一项数据');return;}
  const rec=Object.assign({ts,source:'ocr'},values);
  let key=ldEditKey&&ldEditKey.key;
  if(!key)key='k'+Date.now()+Math.random().toString(36).slice(2,6);
  await DB.set(`rooms/${rid}/liveStats/${y}/${m}/${d}/${key}`,rec);
  await logEvent(rid,{action:'edit',target:`直播数据 ${y}/${m}/${d} ${timeStr}`,after:`GMV=${rec.gmv!=null?rec.gmv:'-'}`});
  localStorage.setItem('ld_last_room',rid);
  resetLdForm();loadLdSessions();
  alert('已保存');
}
async function loadLdSessions(){
  const rid=$('ld-room').value;const box=$('ld-sess-list');if(!rid){box.innerHTML='';return;}
  box.innerHTML='<p class="muted">加载中…</p>';
  const dateStr=$('ld-date').value||'';const [y,m]=dateStr?dateStr.split('-').map(x=>parseInt(x,10)):[new Date().getFullYear(),new Date().getMonth()+1];
  const md=await DB.get(`rooms/${rid}/liveStats/${y}/${m}`);
  const rows=[];
  entriesOf(md).forEach(([dayStr,dd])=>{entriesOf(dd).forEach(([key,rec])=>{if(rec)rows.push(Object.assign({rid,y,m,day:parseInt(dayStr,10),key},rec));});});
  rows.sort((a,b)=>(b.ts||0)-(a.ts||0));
  if(!rows.length){box.innerHTML=`<p class="muted">${y}年${m}月暂无已保存的场次。</p>`;return;}
  box.innerHTML=rows.map(r=>{
    const dt=r.ts?new Date(r.ts):null;
    const dtStr=dt?`${dt.getMonth()+1}/${dt.getDate()} ${pad2(dt.getHours())}:${pad2(dt.getMinutes())}`:`${r.m}/${r.day}`;
    const detail=LIVE_FIELDS.map(f=>r[f.key]!=null?`<span><b>${esc(f.label)}</b>：${r[f.key]}${f.unit}</span>`:'').filter(Boolean).join('');
    return `<div class="ld-sess" id="ld-sess-${r.key}">
      <div class="ld-sess-top" onclick="document.getElementById('ld-sess-${r.key}').classList.toggle('open')">
        <span>${dtStr}</span><b>GMV ${r.gmv!=null?r.gmv:'-'}円</b><span class="muted">成交${r.orders!=null?r.orders:'-'}件 · 观看${r.viewersNow!=null?r.viewersNow:'-'}人 · 新增粉丝${r.newFollowers!=null?r.newFollowers:'-'}</span>
        <span class="sp" style="flex:1"></span>
        <button class="btn-s b-gray" onclick="event.stopPropagation();editLdSession('${esc(r.rid)}',${r.y},${r.m},${r.day},'${esc(r.key)}')">编辑</button>
        <button class="btn-s b-red" onclick="event.stopPropagation();deleteLdSession('${esc(r.rid)}',${r.y},${r.m},${r.day},'${esc(r.key)}')">删除</button>
      </div>
      <div class="ld-sess-detail">${detail}</div>
    </div>`;
  }).join('');
}
async function editLdSession(rid,y,m,day,key){
  const rec=await DB.get(`rooms/${rid}/liveStats/${y}/${m}/${day}/${key}`);if(!rec)return;
  $('ld-room').value=rid;
  $('ld-date').value=`${y}-${pad2(m)}-${pad2(day)}`;
  if(rec.ts){const dt=new Date(rec.ts);$('ld-time').value=`${pad2(dt.getHours())}:${pad2(dt.getMinutes())}`;}
  ldEditKey={rid,y,m,d:day,key};
  $('ld-edit-tag').textContent=`正在编辑 ${y}/${m}/${day} 的场次记录`;
  renderLdGrid(rec,{});
  window.scrollTo?window.scrollTo(0,0):null;$('livedata-scroll').scrollTop=0;
}
async function deleteLdSession(rid,y,m,day,key){
  if(!confirm('删除这条直播数据记录？'))return;
  await DB.remove(`rooms/${rid}/liveStats/${y}/${m}/${day}/${key}`);
  if(ldEditKey&&ldEditKey.rid===rid&&ldEditKey.key===key)resetLdForm();
  loadLdSessions();
}

/* ===== Tab1: 操作日志 ===== */
function scopeRoomIds(){return scope==='all'?Object.keys(rooms):[scope];}
async function loadLogs(){
  $('logs-scroll').innerHTML='<p class="muted">加载中…</p>';
  const all=[];
  for(const rid of scopeRoomIds()){const logs=await DB.get(`rooms/${rid}/logs`);entriesOf(logs).forEach(([k,v])=>{v._room=rid;all.push(v);});}
  logsCache=all;
  /* 动作筛选下拉 */
  const acts=[...new Set(all.map(l=>l.action))];
  const sel=$('log-action');const cur=sel.value;sel.innerHTML='<option value="">全部操作</option>'+acts.map(a=>`<option value="${a}">${actLabel(a)}</option>`).join('');sel.value=cur;
  renderLogs();
}
function renderLogs(){
  const kw=$('log-search').value.trim().toLowerCase(),fa=$('log-action').value,fac=$('log-actor').value;
  let list=logsCache.filter(l=>{
    if(fa&&l.action!==fa)return false;if(fac&&l.actorType!==fac)return false;
    if(kw){const blob=(l.name+' '+l.target+' '+actLabel(l.action)+' '+l.before+' '+l.after+' '+(l.room||'')).toLowerCase();if(!blob.includes(kw))return false;}
    return true;});
  list.sort((a,b)=>(b.ts-a.ts)*logSort.dir);
  const box=$('logs-scroll');
  if(!list.length){box.innerHTML='<p class="muted">没有匹配的日志。</p>';return;}
  /* 按日期分组 */
  const groups={};list.forEach(l=>{const d=(l.time||'').slice(0,10);(groups[d]=groups[d]||[]).push(l);});
  let html='';
  Object.keys(groups).sort((a,b)=>b<a?-1:1).forEach(d=>{
    html+=`<div class="date-group"><div class="date-head">${d||'未知日期'} · ${groups[d].length}条</div>`;
    groups[d].forEach(l=>{
      const chg=(l.before||l.after)?`<span class="t-chg">${esc(l.before||'∅')}<span class="arrow">→</span>${esc(l.after||'∅')}</span>`:'';
      const roomTag=scope==='all'?`<span class="t-actor">${esc((rooms[l._room]||{}).name||l._room)}</span>`:'';
      html+=`<div class="log-row" onclick="this.classList.toggle('open')">
        <div class="log-line"><span class="t-time">${esc((l.time||'').slice(11))}</span><span class="badge" style="background:${actColor(l.action)}">${actLabel(l.action)}</span>${roomTag}<span class="t-actor">${actorLabel(l.actorType)}</span><b>${esc(l.name||'-')}</b><span class="t-uid">UID:${esc(l.uid||'-')}</span><span class="t-target">${esc(l.target||'')}</span>${chg}</div>
        <div class="log-detail">${logDetailText(l)}</div></div>`;
    });
    html+='</div>';
  });
  box.innerHTML=html;
}
function logDetailText(l){
  let s=`${esc(l.time)} ，<b>${esc(actorLabel(l.actorType))} ${esc(l.name||'')}</b>（UID: <code>${esc(l.uid||'-')}</code>，登录ID: <code>${esc(l.userId||'-')}</code>）在直播间「${esc((rooms[l._room]||{}).name||l._room)}」执行了 <b>${esc(actLabel(l.action))}</b> 操作。`;
  if(l.target)s+=`<br>对象：${esc(l.target)}。`;
  if(l.before||l.after)s+=`<br>变更：<code>${esc(l.before||'空')}</code> → <code>${esc(l.after||'空')}</code>。`;
  if(l.targetUser)s+=`<br>被操作用户：<code>${esc(l.targetUser)}</code>。`;
  return s;
}

/* ===== Tab2: 实时日志 ===== */
let rtRefs=[],rtFollow=true;
function startRealtime(){
  stopRealtime();rtFollow=true;$('rt-jump').style.display='none';
  const box=$('rt-scroll');box.innerHTML='';
  const sc=box;
  sc.onscroll=()=>{const atBottom=sc.scrollHeight-sc.scrollTop-sc.clientHeight<40;rtFollow=atBottom;$('rt-jump').style.display=atBottom?'none':'block';};
  scopeRoomIds().forEach(rid=>{
    const ref=fdb.ref(`rooms/${rid}/logs`).limitToLast(50);
    const h=ref.on('child_added',snap=>{const l=snap.val();if(!l)return;l._room=rid;appendRtLine(l);});
    rtRefs.push({ref,h});
  });
}
function appendRtLine(l){
  const box=$('rt-scroll');const div=document.createElement('div');div.className='rt-line';
  const roomTag=scope==='all'?`<span style="color:#7fd1b9">[${esc((rooms[l._room]||{}).name||l._room)}]</span>`:'';
  const _diff=(l.action==='arrive'&&l.after)?`<span style="margin-left:auto;font-weight:700;color:${/晚/.test(l.after)?'#e08a8a':'#7fd1b9'}">${esc(l.after)}</span>`:'';
  const _chg=(l.action!=='arrive'&&(l.before||l.after))?`<span style="color:#7f8a99">${esc(l.before||'∅')}→${esc(l.after||'∅')}</span>`:'';
  div.innerHTML=`<span class="rt-time">${esc(l.time||'')}</span>${roomTag}<span style="color:${actColor(l.action)}">${actLabel(l.action)}</span><span>${esc(l.name||'-')}</span><span class="rt-uid">UID:${esc(l.uid||'-')}</span><span style="color:#9aa4b2">${esc(l.target||'')}</span>${_chg}${_diff}`;
  box.appendChild(div);
  if(rtFollow)box.scrollTop=box.scrollHeight;
}
function rtFollowNow(){rtFollow=true;const box=$('rt-scroll');box.scrollTop=box.scrollHeight;$('rt-jump').style.display='none';}
function stopRealtime(){rtRefs.forEach(({ref,h})=>ref.off('child_added',h));rtRefs=[];const b=$('rt-scroll');if(b)b.onscroll=null;}
function restartRealtime(){startRealtime();}

/* ===== Tab3: 班表总览 ===== */
function ovNav(d){let y=ovYear,m=ovMonth+d;if(m<1){m=12;y--;}if(m>12){m=1;y++;}if(y<2026)return;ovYear=y;ovMonth=m;loadOverview();}
async function loadOverview(){
  $('ov-label').textContent=`${ovYear}年${ovMonth}月`;$('ov-scroll').innerHTML='<p class="muted">加载中…</p>';
  const rows=[];
  for(const rid of scopeRoomIds()){
    const md=await DB.get(`rooms/${rid}/shifts/${ovYear}/${ovMonth}`);if(!md)continue;
    let sl=await DB.get(`rooms/${rid}/slots`);sl=sl||{};
    const slById={};entriesOf(sl).forEach(([id,s])=>slById[id]=s);
    entriesOf(md).forEach(([dayStr,dd])=>{const day=parseInt(dayStr,10);if(!day||!dd)return;
      Object.entries(dd).forEach(([slotId,slot])=>{if(slotId==='memo'||!slot)return;const s=slById[slotId]||{order:0,time:slotId};
        ROLES.forEach(r=>{const h=slot[r.key];if(h&&h.id)rows.push({room:(rooms[rid]||{}).name||rid,day,order:s.order||0,slot:`${s.order||''}班 ${s.time||''}`,role:r.label,name:h.name});});});});
  }
  ovData=rows;renderOverview();
}
let ovSort={key:'day',dir:1};
function renderOverview(){
  const kw=$('ov-search').value.trim().toLowerCase();
  let list=ovData.filter(r=>!kw||(r.name||'').toLowerCase().includes(kw));
  list.sort((a,b)=>{let v;const k=ovSort.key;if(k==='day')v=a.day-b.day||a.order-b.order;else v=(a[k]>b[k]?1:a[k]<b[k]?-1:0);return v*ovSort.dir;});
  const showRoom=scope==='all';
  let h=`<table><thead><tr>${showRoom?'<th onclick="ovSortBy(\'room\')">直播间</th>':''}<th onclick="ovSortBy('day')">日期</th><th onclick="ovSortBy('slot')">班次</th><th onclick="ovSortBy('role')">角色</th><th onclick="ovSortBy('name')">姓名</th></tr></thead><tbody>`;
  if(!list.length)h+=`<tr><td colspan="5" class="muted">本月暂无登记</td></tr>`;
  list.forEach(r=>{h+=`<tr>${showRoom?`<td>${esc(r.room)}</td>`:''}<td>${ovMonth}/${r.day}</td><td>${esc(r.slot)}</td><td>${esc(r.role)}</td><td>${esc(r.name)}</td></tr>`;});
  h+='</tbody></table>';$('ov-scroll').innerHTML=h;
}
function ovSortBy(k){if(ovSort.key===k)ovSort.dir*=-1;else{ovSort.key=k;ovSort.dir=1;}renderOverview();}

/* ===== Tab4: 员工 ===== */
async function loadUsers(){$('users-scroll').innerHTML='<p class="muted">加载中…</p>';const u=await DB.get('users');usersCache=entriesOf(u).map(([,x])=>x);renderUsers();}
let userSort={key:'createdAt',dir:1};
function renderUsers(){
  const kw=$('user-search').value.trim().toLowerCase();
  let list=usersCache.filter(u=>!kw||((u.name||'')+' '+(u.birth||'')).toLowerCase().includes(kw));
  list.sort((a,b)=>{const k=userSort.key;let v;if(k==='createdAt')v=(a.createdAt||0)-(b.createdAt||0);else v=((a[k]||'')>(b[k]||'')?1:(a[k]||'')<(b[k]||'')?-1:0);return v*userSort.dir;});
  let h=`<table><thead><tr><th onclick="userSortBy('name')">昵称</th><th onclick="userSortBy('birth')">生日</th><th onclick="userSortBy('uid')">UID</th><th onclick="userSortBy('createdAt')">注册时间</th></tr></thead><tbody>`;
  if(!list.length)h+=`<tr><td colspan="4" class="muted">暂无员工</td></tr>`;
  list.forEach(u=>{const dt=u.createdAt?new Date(u.createdAt):null;const dts=dt?`${dt.getFullYear()}-${pad2(dt.getMonth()+1)}-${pad2(dt.getDate())}`:'-';
    h+=`<tr><td>${esc(u.name)}</td><td>${esc(u.birth||'-')}</td><td class="mono">${esc(u.uid||'-')}</td><td class="mono">${dts}</td></tr>`;});
  h+='</tbody></table>';$('users-scroll').innerHTML=h;
}
function userSortBy(k){if(userSort.key===k)userSort.dir*=-1;else{userSort.key=k;userSort.dir=1;}renderUsers();}

/* ===== Tab5: 直播间管理 ===== */
function roomUrl(file,rid){const u=new URL(location.href);u.pathname=u.pathname.replace(/[^/]*$/,file);u.search='?room='+encodeURIComponent(rid);return u.toString();}
function renderRooms(){
  let h=`<div class="add-room"><input id="nr-id" placeholder="直播间ID（英文，如 shibuya）" style="flex:1;min-width:140px;"><input id="nr-name" placeholder="显示名称" style="flex:1;min-width:140px;"><button class="btn-s b-blue" onclick="addRoom()">＋ 添加直播间</button></div>`;
  Object.entries(rooms).forEach(([id,r])=>{
    const ow=r.owner||{};
    h+=`<div class="room-card">
      <h3>${esc(r.name)} ${id==='iidabashi'?'<span class="t-actor">默认</span>':''}</h3>
      <div class="rid">ID: ${esc(id)}</div>
      <div class="room-links">
        <a href="${esc(roomUrl('index.html',id))}" target="_blank">👤 员工班表</a>
        <button class="b-gray" onclick="copyUrl('${esc(roomUrl('index.html',id))}')">复制链接</button>
        <a href="${esc(roomUrl('shop.html',id))}" target="_blank">🏬 商家页面</a>
        <button class="b-gray" onclick="copyUrl('${esc(roomUrl('shop.html',id))}')">复制链接</button>
        <button class="btn-s b-gray" onclick="renameRoom('${esc(id)}')">改名</button>
        ${id==='iidabashi'?'':`<button class="btn-s b-red" onclick="delRoom('${esc(id)}')">删除直播间</button>`}
      </div>
      <div class="owner-box">
        <div class="muted" style="margin-bottom:6px;">商家账号（顾客登录 shop.html 用）</div>
        <div class="grid">
          <input id="ow-acc-${id}" placeholder="account" value="${esc(ow.account||'')}">
          <input id="ow-pw-${id}" placeholder="password" value="${esc(ow.password||'')}">
        </div>
        <input id="ow-shop-${id}" placeholder="商家名称 shopName" value="${esc(ow.shopName||'')}" style="margin-bottom:6px;">
        <button class="btn-s b-gold" onclick="setOwner('${esc(id)}')">保存商家账号</button>
        ${ow.account?`<button class="btn-s b-red" onclick="delOwner('${esc(id)}')">删除商家账号</button>`:''}
      </div>
      <div class="owner-box">
        <div class="muted" style="margin-bottom:6px;">打卡网络IP（员工连这些Wi-Fi时自动到岗/离岗 · 可添加多个）</div>
        ${attendIpListHtml(id,r)}
        <input id="att-ip-${id}" placeholder="例：123.45.67.89" style="margin-bottom:6px;">
        <button class="btn-s b-blue" onclick="useCurrentIp('${esc(id)}')">使用当前IP</button>
        <button class="btn-s b-gold" onclick="addAttendIp('${esc(id)}')">添加IP</button>
      </div>
    </div>`;
  });
  $('rooms-scroll').innerHTML=h;
}
function copyUrl(u){navigator.clipboard.writeText(u).then(()=>alert('已复制：\n'+u)).catch(()=>prompt('复制以下链接：',u));}
async function fetchMyIp(){try{const r=await fetch('https://api.ipify.org?format=json',{cache:'no-store'});const j=await r.json();return j&&j.ip;}catch(e){return null;}}
async function useCurrentIp(id){const ip=await fetchMyIp();if(!ip){alert('获取当前IP失败，请重试');return;}$('att-ip-'+id).value=ip;}
function attendIpList(r){const ips=Object.assign({},(r&&r.attendIps)||{});if(r&&r.attendIp)ips['_legacy']=r.attendIp;return Object.entries(ips);}
function attendIpListHtml(id,r){const ent=attendIpList(r);if(!ent.length)return '<div class="muted" style="margin-bottom:4px;">（暂未设置）</div>';return ent.map(([k,ip])=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;"><span class="mono" style="flex:1;">${esc(ip)}</span><button class="btn-s b-red" onclick="delAttendIp('${esc(id)}','${esc(k)}')">删除</button></div>`).join('');}
async function addAttendIp(id){const ip=($('att-ip-'+id).value||'').trim();if(!ip){alert('请先用「使用当前IP」获取，或手动输入IP');return;}const exist=attendIpList(rooms[id]).map(([,v])=>v);if(exist.includes(ip)){alert('该IP已存在');return;}const key='k'+Date.now()+Math.random().toString(36).slice(2,6);await DB.set(`rooms/${id}/attendIps/${key}`,ip);$('att-ip-'+id).value='';await loadRooms();renderRooms();alert('已添加打卡IP：'+ip);}
async function delAttendIp(id,key){if(!confirm('删除该打卡IP？'))return;if(key==='_legacy')await DB.remove(`rooms/${id}/attendIp`);else await DB.remove(`rooms/${id}/attendIps/${key}`);await loadRooms();renderRooms();}
async function addRoom(){
  const id=($('nr-id').value||'').trim(),name=($('nr-name').value||'').trim();
  if(!/^[A-Za-z0-9_-]+$/.test(id)){alert('直播间ID只能用英文/数字/_/-');return;}
  if(!name){alert('请输入显示名称');return;}
  if(rooms[id]){alert('该ID已存在');return;}
  await DB.set(`rooms/${id}/name`,name);
  await DB.set(`rooms/${id}/slots`,{s1:{order:1,time:"10:00〜12:00"},s2:{order:2,time:"15:00〜17:00"},s3:{order:3,time:"17:00〜19:00"},s4:{order:4,time:"20:00〜23:30"},s5:{order:5,time:"25:00〜27:00"}});
  await logEvent(id,{action:'create',target:`新增直播间 ${name}(${id})`,after:name});
  await loadRooms();renderRooms();
}
async function renameRoom(id){const name=prompt('修改显示名称：',rooms[id]?rooms[id].name:'');if(name==null)return;const t=name.trim();if(!t)return;await DB.set(`rooms/${id}/name`,t);await logEvent(id,{action:'create',target:`直播间改名`,before:rooms[id].name,after:t});await loadRooms();renderRooms();}
async function delRoom(id){
  if(id==='iidabashi'){alert('默认直播间不可删除');return;}
  if(!confirm(`⚠️ 第1次确认：删除直播间「${rooms[id].name}」及其全部排班/班次/日志？`))return;
  if(!confirm('⚠️ 第2次确认：此操作不可恢复。真的删除吗？'))return;
  await DB.remove(`rooms/${id}`);await logEvent('iidabashi',{action:'delete',target:`删除直播间 ${rooms[id].name}(${id})`});
  if(scope===id)scope='all';await loadRooms();onScopeChange();renderRooms();
}
async function setOwner(id){
  const acc=($('ow-acc-'+id).value||'').trim(),pw=($('ow-pw-'+id).value||'').trim(),shop=($('ow-shop-'+id).value||'').trim();
  if(!acc||!pw){alert('请填写 account 和 password');return;}
  await DB.set(`rooms/${id}/owner`,{account:acc,password:pw,shopName:shop||rooms[id].name});
  await logEvent(id,{action:'owner_set',target:`商家账号 ${acc}`,after:shop||rooms[id].name});
  await loadRooms();renderRooms();alert('已保存商家账号');
}
async function delOwner(id){if(!confirm('删除该直播间的商家账号？'))return;await DB.remove(`rooms/${id}/owner`);await logEvent(id,{action:'owner_delete',target:`删除商家账号`});await loadRooms();renderRooms();}

/* ===== boot ===== */
if(sessionStorage.getItem('pantera_admin')==='1')startApp();

/* ===== 消息（メッセージ） ===== */
let msgUsers=[];
async function loadMessages(){
  $('msg-scope-label').textContent=scope==='all'?'全部直播间':((rooms[scope]||{}).name||scope);
  const u=await DB.get('users');msgUsers=entriesOf(u).map(([k,x])=>({uid:k,name:x.name||k}));
  renderMsgTargets();renderMsgList();
}
function renderMsgTargets(){
  const to=document.querySelector('input[name="msgto"]:checked').value;const box=$('msg-targets');
  if(to==='all'){box.style.display='none';return;}
  box.style.display='flex';
  box.innerHTML=msgUsers.length?msgUsers.map(u=>`<label class="msg-chip"><input type="checkbox" value="${esc(u.uid)}"> ${esc(u.name)}</label>`).join(''):'<span class="muted">暂无员工</span>';
}
async function sendAdminMessage(){
  const title=$('msg-title').value.trim(),body=$('msg-body').value.trim();
  if(!body){alert('请输入消息内容');return;}
  const to=document.querySelector('input[name="msgto"]:checked').value;
  let toUsers=null;
  if(to==='users'){toUsers={};document.querySelectorAll('#msg-targets input:checked').forEach(c=>toUsers[c.value]=true);if(!Object.keys(toUsers).length){alert('请选择员工');return;}}
  const ids=scopeRoomIds();if(!ids.length){alert('没有可发送的直播间');return;}
  for(const rid of ids){const id='m_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);await DB.set(`rooms/${rid}/messages/${id}`,{from:'管理员',toType:to,toUsers,kind:'notice',title,body,createdAt:Date.now(),reads:{}});}
  $('msg-title').value='';$('msg-body').value='';
  alert('已发送（'+ids.length+' 个直播间）');renderMsgList();
}
async function renderMsgList(){
  const ids=scopeRoomIds();const all=[];
  for(const rid of ids){const ms=await DB.get(`rooms/${rid}/messages`);entriesOf(ms).forEach(([id,m])=>all.push(Object.assign({id,rid},m)));}
  all.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  const box=$('msg-list');
  if(!all.length){box.innerHTML='<p class="muted">暂无消息</p>';return;}
  const nameOf=uid=>{const u=msgUsers.find(x=>x.uid===uid);return u?u.name:uid;};
  box.innerHTML=all.map(m=>{
    let targetUids=m.toType==='all'?msgUsers.map(u=>u.uid):(m.toUsers?Object.keys(m.toUsers):[]);
    const readNames=targetUids.filter(uid=>m.reads&&m.reads[uid]).map(nameOf);
    const unreadNames=targetUids.filter(uid=>!(m.reads&&m.reads[uid])).map(nameOf);
    const toLabel=m.toType==='all'?'全部员工':('指定：'+(m.toUsers?Object.keys(m.toUsers).map(nameOf).join('、'):''));
    const kindTag=m.kind==='delete'?' <span class="msg-kind-a del">删除通知</span>':m.kind==='change'?' <span class="msg-kind-a chg">变更通知</span>':'';
    const roomTag=scope==='all'?` <span class="muted">[${esc((rooms[m.rid]||{}).name||m.rid)}]</span>`:'';
    return `<div class="msg-item"><div class="msg-item-top"><b>${esc(m.title||'通知')}</b>${kindTag} <span class="msg-to-label">${esc(toLabel)}</span>${roomTag}</div>
      <div class="msg-item-body">${esc(m.body||'')}</div>
      <div class="msg-item-read"><b>已确认 ${readNames.length}/${targetUids.length}</b>：${readNames.map(esc).join('、')||'—'}　｜　<span style="color:#e08a8a;">未确认：${unreadNames.length?unreadNames.map(esc).join('、'):'全部已确认 ✓'}</span></div>
      <div style="text-align:right;margin-top:6px;"><button class="btn-s b-red" onclick="deleteAdminMessage('${m.rid}','${m.id}')">删除</button></div></div>`;
  }).join('');
}
async function deleteAdminMessage(rid,id){if(!confirm('删除这条消息？'))return;await DB.remove(`rooms/${rid}/messages/${id}`);renderMsgList();}
</script>
