<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pantera 直播间排班表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#f7f4ee;--ink:#2b2a26;--gold:#b08d3d;--gold-d:#8c6f2f;--line:#e3ddd0;--card:#fffdf8;--green:#bfe6cf;--yellow:#f6e6b4;--red:#f1cccc;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
.serif{font-family:'Noto Serif SC',serif;}
/* login */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#2b2a26,#3a382f);z-index:100;padding:20px;}
#login .box{background:var(--card);border-radius:16px;padding:34px 26px;width:min(360px,92vw);box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center;}
#login .crest{font-size:30px;color:var(--gold);letter-spacing:3px;margin-bottom:4px;}
#login h1{font-size:17px;color:var(--ink);margin-bottom:2px;}
#login .sub{color:#a59c88;font-size:12px;margin-bottom:22px;}
#login input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-bottom:12px;outline:none;background:#fff;font-family:inherit;}
#login input:focus{border-color:var(--gold);}
#login button{width:100%;padding:13px;border:none;border-radius:10px;background:var(--gold);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:2px;}
#login button:active{background:var(--gold-d);}
#login .err{color:#b5544e;font-size:13px;min-height:18px;margin-top:8px;}
/* app */
#app{display:none;}
#app.show{display:block;}
.signboard{background:linear-gradient(160deg,#2b2a26,#403d33);color:#f3ecd8;padding:22px 16px 18px;text-align:center;position:relative;}
.signboard .crest{color:var(--gold);font-size:13px;letter-spacing:6px;margin-bottom:6px;}
.signboard h1{font-size:22px;font-weight:700;letter-spacing:2px;}
.signboard .room{font-size:13px;color:#c9c0a8;margin-top:4px;}
.signboard .logout{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#f3ecd8;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;font-family:inherit;}
.note{background:#fbf6e9;border:1px solid #ecdfbf;color:#9a7d35;font-size:13px;text-align:center;padding:9px 14px;margin:12px;border-radius:10px;}
.navbar{display:flex;align-items:center;justify-content:center;gap:20px;padding:6px 0 4px;}
.navbar button{width:40px;height:34px;border:1px solid var(--line);border-radius:9px;background:var(--card);color:var(--ink);font-size:18px;cursor:pointer;}
.navbar button:disabled{opacity:.35;}
.navbar .mlabel{font-size:17px;font-weight:700;min-width:120px;text-align:center;}
.legend{display:flex;justify-content:center;gap:16px;font-size:11px;color:#8a8474;padding:2px 0 8px;}
.legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:4px;vertical-align:-1px;}
.wk{display:grid;grid-template-columns:repeat(7,1fr);padding:0 8px;}
.wk div{text-align:center;font-size:12px;color:#9a927e;padding:3px 0;}
.wk div:first-child{color:#c07a6e;}.wk div:last-child{color:#6f86ad;}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:4px 8px 24px;}
.cell{background:var(--card);border:1px solid var(--line);border-radius:8px;min-height:78px;padding:3px;display:flex;flex-direction:column;}
.cell.adj{background:transparent;border-color:transparent;}
.cell .dn{font-size:11px;text-align:center;color:#7c7565;font-weight:600;}
.cell.adj .dn{color:#cfc8b8;}
.brow{flex:1;border-radius:4px;margin-top:2px;background:var(--red);display:flex;align-items:center;justify-content:center;padding:0 1px;overflow:hidden;cursor:pointer;}
.brow .nm{font-size:8px;line-height:1.1;color:#2b2a26;font-weight:600;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;}
/* detail modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:60;}
.overlay.show{display:flex;}
.dsheet{background:var(--card);width:100%;max-width:520px;border-radius:18px 18px 0 0;padding:18px 18px 28px;max-height:80vh;overflow:auto;}
.dsheet h3{font-size:17px;margin-bottom:2px;}
.dsheet .dt{color:#9a927e;font-size:13px;margin-bottom:14px;}
.drole{display:flex;align-items:center;gap:10px;background:#faf7ef;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.drole .rl{font-weight:700;min-width:64px;color:var(--gold-d);}
.drole .rn{flex:1;}
.drole .none{color:#b3ab98;}
.dsheet .closebtn{width:100%;margin-top:10px;padding:12px;border:none;border-radius:10px;background:var(--ink);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
.foot{text-align:center;color:#a89f88;font-size:11px;padding:0 0 20px;}
</style>
</head>
<body>
<div id="login"><div class="box">
  <div class="crest serif">PANTERA</div>
  <h1 class="serif">商家专用 · 排班查询</h1>
  <div class="sub">请输入管理员发放的商家账号</div>
  <input id="s-acc" placeholder="账号 account" autocomplete="off">
  <input id="s-pw" type="password" placeholder="密码 password">
  <button onclick="shopLogin()">登 录</button>
  <div class="err" id="s-err"></div>
</div></div>

<div id="app">
  <div class="signboard">
    <div class="crest serif">P A N T E R A</div>
    <h1 class="serif" id="shop-name">商家</h1>
    <div class="room" id="room-name"></div>
    <button class="logout" onclick="shopLogout()">退出</button>
  </div>
  <div class="note">如需调整班表，请联系管理员</div>
  <div class="navbar"><button id="prev" onclick="navMonth(-1)">‹</button><span class="mlabel" id="mlabel"></span><button onclick="navMonth(1)">›</button></div>
  <div class="legend"><span><i style="background:var(--green)"></i>已齐</span><span><i style="background:var(--yellow)"></i>缺一方</span><span><i style="background:var(--red)"></i>无人</span></div>
  <div class="wk"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div>
  <div class="grid" id="grid"></div>
  <div class="foot">© Pantera 直播事务所 · 仅供查看</div>
</div>

<div class="overlay" id="detail"><div class="dsheet">
  <h3 id="d-title"></h3><div class="dt" id="d-sub"></div>
  <div id="d-body"></div>
  <button class="closebtn" onclick="closeDetail()">关闭</button>
</div></div>

<script>
const firebaseConfig={databaseURL:"https://pantera-paibanbiao-default-rtdb.asia-southeast1.firebasedatabase.app"};
const BASE=firebaseConfig.databaseURL;
const ROLES=[{key:'A',label:'直播1',kind:'直播'},{key:'B',label:'直播2',kind:'直播'},{key:'C',label:'中控1',kind:'中控'},{key:'D',label:'中控2',kind:'中控'},{key:'E',label:'待机1',kind:'待机'},{key:'F',label:'待机2',kind:'待机'}];
firebase.initializeApp(firebaseConfig);
const fdb=firebase.database();
const DB={get:p=>fdb.ref(p).once('value').then(s=>s.val()),set:(p,v)=>fdb.ref(p).set(v),raw:fdb};
const $=id=>document.getElementById(id);
function entriesOf(x){return x?Object.entries(x).filter(([,v])=>v!=null):[];}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function pad2(n){return String(n).padStart(2,'0');}
function nowStr(){const d=new Date();return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;}
function qs(n){return new URLSearchParams(location.search).get(n);}
async function logEvent(roomId,ev){try{const ts=Date.now();const key=(9999999999999-ts)+'_'+Math.random().toString(36).slice(2,7);
  await DB.set(`rooms/${roomId}/logs/${key}`,{time:nowStr(),ts,uid:'',userId:ev.account||'',name:ev.shopName||'商家',actorType:'owner',room:roomId,action:ev.action||'',target:ev.target||'',before:'',after:''});}catch(e){}}

let roomId=null,roomName='',shopName='',slots={},viewYear=2026,viewMonth=6,monthData={};

async function listRoomIds(){try{const r=await fetch(BASE+'/rooms.json?shallow=true');const j=await r.json();return j?Object.keys(j):[];}catch(e){return[];}}

async function shopLogin(){
  const acc=($('s-acc').value||'').trim(),pw=($('s-pw').value||'').trim(),err=$('s-err');err.textContent='';
  if(!acc||!pw){err.textContent='请输入账号和密码';return;}
  const prefer=qs('room');
  let found=null;
  /* 优先匹配 ?room= */
  if(prefer){const ow=await DB.get(`rooms/${prefer}/owner`);if(ow&&ow.account===acc&&ow.password===pw)found={rid:prefer,owner:ow};}
  if(!found){const ids=await listRoomIds();for(const id of ids){const ow=await DB.get(`rooms/${id}/owner`);if(ow&&ow.account===acc&&ow.password===pw){found={rid:id,owner:ow};break;}}}
  if(!found){err.textContent='账号或密码错误';return;}
  roomId=found.rid;shopName=found.owner.shopName||'商家';
  sessionStorage.setItem('pantera_shop',JSON.stringify({roomId,acc,pw,shopName}));
  logEvent(roomId,{action:'login',account:acc,shopName,target:'商家登录'});
  enterApp();
}
function shopLogout(){sessionStorage.removeItem('pantera_shop');location.reload();}

async function enterApp(){
  $('login').style.display='none';$('app').classList.add('show');
  roomName=await DB.get(`rooms/${roomId}/name`)||roomId;
  $('shop-name').textContent=shopName;$('room-name').textContent='📺 '+roomName;
  document.title='Pantera · '+roomName;
  slots=await DB.get(`rooms/${roomId}/slots`)||{};
  const now=new Date();viewYear=Math.max(now.getFullYear(),2026);viewMonth=now.getFullYear()>=2026?now.getMonth()+1:6;
  subscribeMonth();
}
function slotList(){return entriesOf(slots).sort((a,b)=>(a[1].order||0)-(b[1].order||0));}
let unsub=null;
function subscribeMonth(){
  if(unsub)unsub();
  const ref=fdb.ref(`rooms/${roomId}/shifts/${viewYear}/${viewMonth}`);
  const h=ref.on('value',s=>{monthData=s.val()||{};render();});
  unsub=()=>ref.off('value',h);
}
function navMonth(d){let y=viewYear,m=viewMonth+d;if(m<1){m=12;y--;}if(m>12){m=1;y++;}if(y<2026)return;viewYear=y;viewMonth=m;subscribeMonth();}
function getSlot(day,slotId){const dd=monthData[day]||monthData[String(day)];return(dd&&dd[slotId])||null;}
function color(day,slotId){const s=getSlot(day,slotId);const has=k=>(s&&s[k]&&s[k].id)?1:0;const G=has('A')+has('B'),H=has('C')+has('D'),I=has('E')+has('F');const g=(G>0?1:0)+(H>0?1:0)+(I>0?1:0);if(g>=2)return'var(--green)';if(g===1)return'var(--yellow)';return'var(--red)';}
function render(){
  $('mlabel').textContent=`${viewYear}年${viewMonth}月`;$('prev').disabled=(viewYear===2026&&viewMonth===1);
  const grid=$('grid');grid.innerHTML='';
  const first=new Date(viewYear,viewMonth-1,1).getDay();
  const days=new Date(viewYear,viewMonth,0).getDate();
  const prevDays=new Date(viewYear,viewMonth-1,0).getDate();
  const sl=slotList();
  const adj=n=>{const c=document.createElement('div');c.className='cell adj';c.innerHTML=`<div class="dn">${n}</div>`;return c;};
  for(let i=0;i<first;i++)grid.appendChild(adj(prevDays-first+1+i));
  for(let day=1;day<=days;day++){
    const cell=document.createElement('div');cell.className='cell';
    const dn=document.createElement('div');dn.className='dn';dn.textContent=day;cell.appendChild(dn);
    sl.forEach(([slotId])=>{
      const row=document.createElement('div');row.className='brow';row.style.background=color(day,slotId);
      const s=getSlot(day,slotId);const names=[];if(s)ROLES.forEach(r=>{if(s[r.key]&&s[r.key].name)names.push(Array.from(s[r.key].name)[0]);});
      const sp=document.createElement('span');sp.className='nm';sp.textContent=names.join('');row.appendChild(sp);
      row.onclick=()=>openDetail(day,slotId);
      cell.appendChild(row);
    });
    grid.appendChild(cell);
  }
  const trail=(7-(first+days)%7)%7;for(let i=1;i<=trail;i++)grid.appendChild(adj(i));
}
function openDetail(day,slotId){
  const s=slots[slotId]||{};const slot=getSlot(day,slotId)||{};
  $('d-title').textContent=`${s.order?s.order+'班':''} ${s.time||''}`;
  $('d-sub').textContent=`${viewMonth}月${day}日 · ${roomName}`;
  /* 仅显示 姓名 / 时间帯 / 役割种类。不显示 ID·生日·UID·密码 */
  let h='';
  [['直播',['A','B']],['中控',['C','D']],['待机',['E','F']]].forEach(([kind,keys])=>{
    keys.forEach(k=>{const r=ROLES.find(x=>x.key===k);const holder=slot[k]&&slot[k].name?slot[k]:null;
      h+=`<div class="drole"><span class="rl">${r.label}</span><span class="rn">${holder?esc(holder.name):'<span class="none">未登记</span>'}</span></div>`;});
  });
  $('d-body').innerHTML=h;$('detail').classList.add('show');
}
function closeDetail(){$('detail').classList.remove('show');}
$('detail').addEventListener('click',e=>{if(e.target.id==='detail')closeDetail();});
$('s-pw').addEventListener('keydown',e=>{if(e.key==='Enter')shopLogin();});

/* 会话恢复 */
(async function(){
  const saved=sessionStorage.getItem('pantera_shop');
  if(saved){try{const o=JSON.parse(saved);const ow=await DB.get(`rooms/${o.roomId}/owner`);
    if(ow&&ow.account===o.acc&&ow.password===o.pw){roomId=o.roomId;shopName=ow.shopName||o.shopName||'商家';enterApp();return;}}catch(e){}}
})();
</script>
</body>
</html>
